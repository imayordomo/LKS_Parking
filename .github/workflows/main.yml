name: Kotlin CI

on:
  push:
    branches:
      - develop
      - master
      - 'feature/**'
      - 'refactor/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - develop
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build-and-test:
    name: Unit tests, quality & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build, unit test & quality checks
        run: ./gradlew testDebugUnitTest jacocoTestReport detekt lint assembleDebug --stacktrace

      - name: Upload Test & Coverage Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports-and-coverage
          path: |
            **/build/reports/tests/
            **/build/test-results/
            **/build/reports/jacoco/
            **/build/reports/detekt/
            **/build/reports/lint-results*/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: SonarCloud Scan
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

  instrumented-tests:
    name: Instrumented tests (emulator)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        api-level: [29]
        target: [google_apis]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: pixel_6_pro
          ram-size: 2048M
          heap-size: 512M
          disk-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          disable-animations: true
          disable-spellchecker: true
          emulator-boot-timeout: 600
          script: ./gradlew connectedDebugAndroidTest --stacktrace

